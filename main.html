<!DOCTYPE html>
<html>
<head>
  <title>Main Page</title>

  <!-- Link CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<!-- loadMainPage() runs when page loads -->
<body onload="loadMainPage()">

  <!-- Main page wrapper -->
  <div class="page">

    <!-- Top navigation bar -->
    <div class="top-bar">
      <h1>Music Subscription App</h1>

      <!-- Logout button -->
      <button onclick="logout()">Logout</button>
    </div>

    <!-- USER AREA -->
    <section>
      <h2>User Area</h2>

      <!-- Display logged-in username -->
      <p>Welcome, <span id="username"></span></p>
    </section>

    <!-- SUBSCRIPTION AREA -->
    <section>
      <h2>Subscription Area</h2>

      <!-- Subscribed songs will be dynamically inserted here -->
      <div id="subscriptions"></div>
    </section>

    <!-- QUERY AREA -->
    <section>
      <h2>Query Area</h2>

      <!-- Search form -->
      <div class="form-grid">
        <input type="text" id="title" placeholder="Title">
        <input type="text" id="year" placeholder="Year">
        <input type="text" id="artist" placeholder="Artist">
        <input type="text" id="album" placeholder="Album">
      </div>

      <!-- Query button -->
      <button onclick="queryMusic()">Query</button>

      <!-- Query error message -->
      <p id="queryMessage" class="error"></p>

      <!-- Query results will appear here -->
      <div id="results"></div>
    </section>

  </div>

  <!-- Scripts -->
  <script src="config.js"></script>
  <script src="main.js"></script>
</body>
</html>
