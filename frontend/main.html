<!DOCTYPE html>
<html>
<head>
  <title>Music Subscription App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="loadMainPage()">

  <div class="page">

    <!-- Top navigation -->
    <div class="top-bar">
      <div>
        <h1>Music Subscription App</h1>
        <p class="top-subtitle">
          Search, subscribe, and manage your music library.
        </p>
      </div>

      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <!-- Account section -->
    <section>
      <h2>Account</h2>
      <p class="section-text">
        Welcome, <strong><span id="username"></span></strong>
      </p>
    </section>

    <!-- Subscription section -->
    <section>
      <div class="section-header">
        <h2>My Subscriptions</h2>
        <p class="section-text">
          Songs you subscribe to will appear here.
        </p>
      </div>

      <div id="subscriptions"></div>
    </section>

    <!-- Query/Search section -->
    <section>
      <div class="section-header">
        <h2>Search Music</h2>

        <!-- Help / explanation text -->
        <p class="section-text">
          Enter at least one field to search. Multiple fields will be combined.
          <br>
          Example: Artist = Kendrick Lamar and Title = Bad Blood.
        </p>
      </div>

      <!-- Form allows Enter key to trigger search -->
      <form onsubmit="event.preventDefault(); queryMusic();">
        <div class="form-grid">
          <input type="text" id="title" placeholder="Title">
          <input type="text" id="year" placeholder="Year">
          <input type="text" id="artist" placeholder="Artist">
          <input type="text" id="album" placeholder="Album">
        </div>

        <button type="submit">Search</button>
      </form>

      <!-- Error message -->
      <p id="queryMessage" class="error"></p>

      <!-- Results -->
      <div id="results"></div>
    </section>

  </div>

  <script src="config.js"></script>
  <script src="main.js"></script>
</body>
</html>
